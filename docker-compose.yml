services:
  tasktracker:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      DATA_DIR: /app/data
      PORT: "8000"
      HTTPS_ONLY: ${HTTPS_ONLY:-true}
    volumes:
      - tasktracker-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  tasktracker-data:
