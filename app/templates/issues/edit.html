{% extends "base.html" %}
{% block title %}Настроить · {{ issue.title }}{% endblock %}
{% block content %}
<div class="edit-page">
  <div class="page-head">
    <div>
      <p class="eyebrow mono">
        <a href="/projects/{{ project.id }}/issues/{{ issue.id }}">К задаче</a>
      </p>
      <h1>Настроить</h1>
      <p class="muted">{{ issue.title }}</p>
    </div>
    <a class="btn btn-ghost" href="/projects/{{ project.id }}/issues/{{ issue.id }}">Назад</a>
  </div>

  <form method="post" action="/projects/{{ project.id }}/issues/{{ issue.id }}" class="edit-form">
    <label>Название
      <input name="title" value="{{ issue.title }}" required autofocus>
    </label>
    <label>Описание
      <textarea name="description" rows="10">{{ issue.description }}</textarea>
    </label>
    <div class="form-grid">
      <label>Приоритет
        <select name="priority">
          {% for p in priorities %}
          <option value="{{ p }}" {% if issue.priority == p %}selected{% endif %}>{{ priority_labels[p] }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Исполнитель
        <select name="assignee_id">
          <option value="">Не назначен</option>
          {% for m in members %}
          <option value="{{ m.id }}" {% if issue.assignee_id == m.id %}selected{% endif %}>{{ m.name }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <label>Метки
      <input name="labels" value="{{ issue.labels }}" placeholder="ui, backend">
    </label>
    <p class="muted meta">Статус меняется через кнопку выполнения и подтверждение автора — не здесь.</p>
    <footer class="edit-actions">
      <button class="btn btn-primary" type="submit">Сохранить</button>
      <a class="btn btn-ghost" href="/projects/{{ project.id }}/issues/{{ issue.id }}">Отмена</a>
    </footer>
  </form>
</div>
{% endblock %}
