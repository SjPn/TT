{% extends "base.html" %}
{% block title %}{{ project.name }} · Список{% endblock %}
{% block content %}
{% include "partials/project_header.html" %}

<form class="filters" method="get" action="/projects/{{ project.id }}" data-auto-filter>
  <input type="hidden" name="view" value="list">
  <input type="search" name="q" value="{{ q }}" placeholder="Поиск…" class="search">
  <select name="status">
    <option value="">Все активные</option>
    {% for s in statuses %}
    <option value="{{ s }}" {% if filter_status == s %}selected{% endif %}>{{ status_labels[s] }}</option>
    {% endfor %}
  </select>
  <select name="priority">
    <option value="">Все приоритеты</option>
    {% for p in priorities %}
    <option value="{{ p }}" {% if filter_priority == p %}selected{% endif %}>{{ priority_labels[p] }}</option>
    {% endfor %}
  </select>
  <label class="filter-check">
    <input type="checkbox" name="mine" value="1" {% if filter_mine %}checked{% endif %}>
    Мои
  </label>
</form>

<div class="table-wrap">
  <table class="issue-table">
    <thead>
      <tr>
        <th>Название</th>
        <th>Приоритет</th>
        <th>Статус</th>
        <th>Исполнитель</th>
      </tr>
    </thead>
    <tbody id="issue-rows">
      {% include "partials/issue_rows.html" %}
    </tbody>
  </table>
</div>

{% include "partials/new_issue_dialog.html" %}
{% endblock %}
