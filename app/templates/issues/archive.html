{% extends "base.html" %}
{% block title %}{{ project.key }} · Архив{% endblock %}
{% block content %}
{% include "partials/project_header.html" %}

<form class="filters" method="get" action="/projects/{{ project.id }}">
  <input type="hidden" name="view" value="archive">
  <input type="search" name="q" value="{{ q }}" placeholder="Поиск…" class="search">
  <select name="priority">
    <option value="">Все приоритеты</option>
    {% for p in priorities %}
    <option value="{{ p }}" {% if filter_priority == p %}selected{% endif %}>{{ priority_labels[p] }}</option>
    {% endfor %}
  </select>
  <label class="filter-check">
    <input type="checkbox" name="mine" value="1" {% if filter_mine %}checked{% endif %}>
    Мои
  </label>
  <button class="btn btn-secondary" type="submit">Фильтр</button>
</form>

<div class="table-wrap">
  <table class="issue-table">
    <thead>
      <tr>
        <th>Название</th>
        <th>Приоритет</th>
        <th>Статус</th>
        <th>Исполнитель</th>
      </tr>
    </thead>
    <tbody>
      {% include "partials/issue_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
