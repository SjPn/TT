{% extends "base.html" %}
{% block title %}{{ project.key }} · Архив{% endblock %}
{% block content %}
{% include "partials/project_header.html" %}

<form class="filters" method="get" action="/projects/{{ project.id }}">
  <input type="hidden" name="view" value="archive">
  <input type="search" name="q" value="{{ q }}" placeholder="Search…" class="search">
  <select name="priority">
    <option value="">All priorities</option>
    {% for p in priorities %}
    <option value="{{ p }}" {% if filter_priority == p %}selected{% endif %}>{{ priority_labels[p] }}</option>
    {% endfor %}
  </select>
  <button class="btn btn-secondary" type="submit">Filter</button>
</form>

<div class="table-wrap">
  <table class="issue-table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Assignee</th>
      </tr>
    </thead>
    <tbody>
      {% include "partials/issue_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
