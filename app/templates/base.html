<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TaskTracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  {% if user is defined and user %}
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">TaskTracker</a>
      {% if project is defined and project %}
      <nav class="crumbs">
        <a href="/">Projects</a>
        <span>/</span>
        <a href="/projects/{{ project.id }}">{{ project.key }}</a>
      </nav>
      {% endif %}
      <div class="topbar-right">
        <span class="user-chip">{{ user.name }}</span>
        <form method="post" action="/logout">
          <button type="submit" class="btn btn-ghost btn-sm">Log out</button>
        </form>
      </div>
    </div>
  </header>
  {% endif %}
  <main class="{% block main_class %}page{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
