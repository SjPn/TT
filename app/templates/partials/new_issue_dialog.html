<dialog id="new-issue" class="modal modal-wide">
  <form method="post" action="/projects/{{ project.id }}/issues" enctype="multipart/form-data">
    <header>
      <h2>Новая задача</h2>
      <button type="button" class="btn btn-ghost btn-sm" onclick="this.closest('dialog').close()">Закрыть</button>
    </header>
    <label>Название
      <input name="title" required placeholder="Кратко и ясно" autofocus>
    </label>
    <label>Описание
      <textarea name="description" rows="4" placeholder="Поддерживается Markdown"></textarea>
    </label>
    <label>Фото
      <span class="hint">JPG, PNG, GIF, WebP — несколько файлов</span>
      <input type="file" name="photos" accept="image/*" multiple data-preview>
      <div class="photo-preview" hidden></div>
    </label>
    <div class="form-grid">
      <label>Приоритет
        <select name="priority">
          {% for p in priorities %}
          <option value="{{ p }}" {% if p == 'p3' %}selected{% endif %}>{{ priority_labels[p] }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Исполнитель
        <select name="assignee_id">
          <option value="">Не назначен</option>
          {% for m in members %}
          <option value="{{ m.id }}">{{ m.name }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <label>Метки <span class="hint">(через запятую)</span>
      <input name="labels" placeholder="ui, backend">
    </label>
    <footer>
      <button class="btn btn-primary" type="submit">Создать задачу</button>
    </footer>
  </form>
</dialog>
